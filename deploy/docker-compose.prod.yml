# Produktiv-Instanz (ECG) – fertiges Image aus GHCR, KEIN lokaler Build.
#
# Update-Strategie (seit v2.2.0): bewusst statt blind ziehen.
#   - Image auf den Major-Tag :2 gepinnt → keine ungewollte größere Umstellung (v3).
#   - KEIN Auto-Pull-Dienst mehr (das alte containrrr/watchtower ist unmaintained
#     und mit Docker 28/29+ inkompatibel). Auf neue Versionen weist das In-App-Banner hin.
#   - Aktualisieren bewusst (nicht während der Gottesdienstzeit), per SSH im NAS-Ordner:
#         docker compose pull && docker compose up -d && docker image prune -f
#     oder im Container Manager das Projekt neu aufbauen lassen. Daten-Volume behalten!
#
# Einmalige Umstellung im Synology Container-Manager:
#   1. Aktuelles Projekt `worship-charts` stoppen + löschen
#      – **Volume `worship-data` UNBEDINGT BEHALTEN** (enthält Gemeindename + Links).
#   2. Neues Projekt aus DIESER Datei + der vorhandenen Prod-.env (CHURCHTOOLS_BASE_URL +
#      SESSION_SECRET) erstellen. Möglichst denselben Projektnamen verwenden, damit das
#      vorhandene Volume wiederverwendet wird.
#   3. Reverse Proxy bleibt: musik.ecg-donrath.de → localhost:3001 (unverändert).
services:
  app:
    image: ghcr.io/falwin/churchtools-musik-app:2
    container_name: worship-charts
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CHURCHTOOLS_BASE_URL: ${CHURCHTOOLS_BASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_PERMISSION: ${ADMIN_PERMISSION:-churchcore:administer persons}
    ports:
      - '3001:3001'
    volumes:
      - worship-data:/app/data

volumes:
  # WICHTIG: vorhandenes Prod-Volume wiederverwenden (Gemeindename/Links). Beim Neu-Erstellen
  # unter demselben Projektnamen bleibt es erhalten.
  worship-data:
