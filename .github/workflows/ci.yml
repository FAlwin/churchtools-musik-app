name: CI

# Läuft bei jedem Push auf main und bei jedem Pull Request.
# Kein DB-Service nötig: ChurchTools ist die Datenquelle, die App hat keine eigene DB.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
