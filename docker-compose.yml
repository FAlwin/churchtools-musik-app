# Deployment auf dem Synology-NAS (Container Manager).
# Werte kommen aus der .env-Datei im selben Ordner.
services:
  app:
    build: .
    container_name: worship-charts
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      CHURCHTOOLS_BASE_URL: ${CHURCHTOOLS_BASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SITE_CONFIG_PATH: /app/data/site.json
    # Zugriff im WLAN über http://<NAS-IP>:3001; extern über den Synology Reverse Proxy
    # (https://musik.ecg-donrath.de → localhost:3001), siehe DEPLOYMENT.md Schritt 4.
    ports:
      - '3001:3001'
    # Laufzeit-Branding (site.json) persistent halten – übersteht Container-Neubau.
    volumes:
      - worship-data:/app/data

volumes:
  worship-data:
