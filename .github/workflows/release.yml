name: Release

# Bei jedem Versions-Tag (z. B. v2.0.0) ein fertiges Multi-Arch-Image bauen
# und nach GHCR pushen. amd64 UND arm64, weil viele NAS auf ARM laufen.
# Ablauf: erst in main mergen (CI grün) → dann `git tag vX.Y.Z && git push origin vX.Y.Z`.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU + Buildx: ermöglichen den arm64-Build auf dem amd64-Runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Erzeugt die Image-Tags aus dem Git-Tag: 2.0.0, 2.0 und (bei stabilen
      # Releases) latest. Der Image-Name wird automatisch klein geschrieben.
      - name: Docker-Metadaten
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
