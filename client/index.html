<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0061A1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Name, den iOS beim „Zum Home-Bildschirm" vorschlägt -->
    <meta name="apple-mobile-web-app-title" content="Churchtools Musik App" />
    <title>Churchtools Musik App</title>
    <!-- Kein Web-Font: die App nutzt durchgängig den System-Font (var(--ui)). -->
  </head>
  <body>
    <!-- Boot-Fallback: sofort sichtbar, BEVOR das App-JS lädt/startet. React (createRoot) ersetzt
         diesen Inhalt beim ersten Rendern. Bleibt er stehen (App-JS lädt nicht / Startfehler),
         sieht man statt eines WEISSEN Bildschirms eine Meldung – und nach kurzer Zeit einen
         Nachlade-Knopf. Alles inline (Styles + Skript), damit es auch ohne geladenes CSS/JS wirkt;
         index.html liegt im Offline-Precache → funktioniert auch ohne Netz. (#32) -->
    <div id="root">
      <div
        id="boot-fallback"
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 14px;
          font-family:
            system-ui,
            -apple-system,
            sans-serif;
          color: #667;
          background: #f5f6f8;
          padding: 24px;
          text-align: center;
        "
      >
        <div id="boot-msg" style="font-size: 15px">Einen Moment…</div>
        <button
          id="boot-reload"
          style="
            display: none;
            padding: 10px 20px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            background: #0061a1;
            color: #fff;
          "
        >
          Neu laden
        </button>
      </div>
    </div>
    <script>
      // Dauert der Start ungewöhnlich lange (hängender/fehlender App-Code), Nachlade-Knopf zeigen.
      setTimeout(function () {
        var msg = document.getElementById('boot-msg');
        var btn = document.getElementById('boot-reload');
        if (msg && btn) {
          msg.textContent = 'Das dauert länger als üblich.';
          btn.style.display = '';
          btn.addEventListener('click', function () {
            location.reload();
          });
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
