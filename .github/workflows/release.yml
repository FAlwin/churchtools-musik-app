name: Release (Docker-Image)

# Bei einem Versions-Tag (v1.2.3) wird das Image gebaut und nach GHCR gepusht.
# Bei Pull Requests wird das Image nur GEBAUT (nicht gepusht) – validiert das Dockerfile.
on:
  push:
    tags: ['v*']
  pull_request:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/churchtools-musik-app

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Nur beim Tag (Push) an GHCR anmelden.
      - name: Login to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Tags ableiten
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Tag „latest" + die Version aus dem Git-Tag (v1.2.3 → 1.2.3)
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Bauen (+ Push nur beim Tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
