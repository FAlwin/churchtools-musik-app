# Verteilung an andere Gemeinden: nutzt das fertige Image aus der GitHub
# Container Registry (kein Selbstbau nötig). Werte aus der .env im selben Ordner.
# Anleitung: ANLEITUNG.md
services:
  app:
    image: ghcr.io/falwin/churchtools-musik-app:latest
    container_name: musik-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Adresse der EIGENEN ChurchTools-Instanz (ohne Slash am Ende)
      CHURCHTOOLS_BASE_URL: ${CHURCHTOOLS_BASE_URL}
      # Langer Zufallsstring zum Signieren der Anmelde-Cookies
      SESSION_SECRET: ${SESSION_SECRET}
      SITE_CONFIG_PATH: /app/data/site.json
      # Optional: ChurchTools-Recht, das als „Administrator" gilt (Branding-Einstellungen)
      ADMIN_PERMISSION: ${ADMIN_PERMISSION:-churchcore:administer persons}
    ports:
      - '3001:3001'
    # Branding (Name/Logo/Farben) bleibt über Updates erhalten.
    volumes:
      - musik-data:/app/data

volumes:
  musik-data:
