name: CI

# Läuft bei jedem Push auf main und bei jedem Pull Request.
# Kein DB-Service nötig: ChurchTools ist die Datenquelle, die App hat keine eigene DB.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium

      - name: E2E-Smoke (Chart-Render via ?demo=chart, ohne Backend)
        run: npm run test:e2e
