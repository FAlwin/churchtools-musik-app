# Produktiv-Instanz – fertiges Image aus GHCR, KEIN lokaler Build.
#
# Update-Strategie (seit v2.2.0): bewusst statt blind ziehen.
#   - Image auf den Major-Tag :2 gepinnt → keine ungewollte größere Umstellung (v3).
#   - KEIN Auto-Pull-Dienst (Watchtower) im Produktivbetrieb: Updates werden bewusst
#     eingespielt, nicht während einer Veranstaltung. Auf neue Versionen weist das
#     In-App-Banner hin. (Eine Test-Instanz mit Auto-Update gibt es in docker-compose.staging.yml.)
#   - Aktualisieren bewusst (nicht während der Gottesdienstzeit), per SSH im Projekt-Ordner:
#         docker compose pull && docker compose up -d && docker image prune -f
#     oder im Synology Container Manager. Dort gibt es KEINEN Knopf „Zurücksetzen"; das bestehende
#     Projekt neu aufbauen = Projekt öffnen → Stopp → Aktion › Löschen (dabei KEINE Volumes/Daten
#     mitlöschen anhaken!) → Projekt › Erstellen. Ein reiner „Neustart" übernimmt geänderte
#     Umgebungsvariablen (z. B. COOKIE_SECURE) NICHT. Daten-Volume immer behalten!
#
# Einrichtung im Synology Container-Manager (oder per docker compose):
#   1. Neues Projekt aus DIESER Datei + einer Prod-.env erstellen (siehe .env.example:
#      mindestens CHURCHTOOLS_BASE_URL + SESSION_SECRET).
#   2. Reverse Proxy davorsetzen: eure Domain (HTTPS/Let's Encrypt) → localhost:3001.
#   3. Volume `worship-data` enthält Gemeindename + Links – beim Neu-Erstellen unter
#      demselben Projektnamen bleibt es erhalten, NICHT löschen.
# Projektname FEST verdrahtet – verhindert den Datenverlust vom 2026-07-08:
# Der interne Volume-Name ist `<projektname>_<volume-key>`. Vergibt der Container Manager beim
# (Neu-)Anlegen einen ABWEICHENDEN Projektnamen, hängt der Container an einem NEUEN, leeren Volume
# (die alten Daten bleiben erhalten, sind aber nicht mehr eingehängt → App zeigt Werkseinstellung).
# `name` fixiert den Projektnamen unabhängig vom Container Manager.
#   ⚠️ EINMAL gesetzt NIE ändern – sonst neues leeres Volume.
#   ⚠️ Bestehende Instanz: auf den VORHANDENEN Projektnamen setzen, damit das vorhandene Volume
#      weitergenutzt wird. ECG-Prod = `worship-charts` (Volume `worship-charts_worship-data`).
#      Neue Gemeinde: einen eigenen festen Namen wählen (z. B. `musik-app`).
name: worship-charts
services:
  app:
    image: ghcr.io/falwin/churchtools-musik-app:2
    container_name: musik-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CHURCHTOOLS_BASE_URL: ${CHURCHTOOLS_BASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      # Prod läuft ausschließlich über HTTPS (Reverse Proxy + Let's Encrypt) → Secure-Flag
      # am Session-Cookie an. Default true; über die Prod-.env übersteuerbar, falls je nötig.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ADMIN_PERMISSION: ${ADMIN_PERMISSION:-churchcore:administer persons}
    ports:
      # Nur auf localhost binden: der Zugriff läuft ausschließlich über den Reverse Proxy (HTTPS).
      # Direkter LAN-Zugriff (HTTP, Cookie ohne Secure-Wirkung) bleibt damit zu. Falls eine
      # Instanz WIRKLICH ohne Reverse Proxy laufen soll, bewusst auf '3001:3001' ändern.
      - '127.0.0.1:3001:3001'
    volumes:
      - worship-data:/app/data

volumes:
  # WICHTIG: vorhandenes Prod-Volume wiederverwenden (Gemeindename/Links). Beim Neu-Erstellen
  # unter demselben Projektnamen bleibt es erhalten. Der Volume-Name bleibt bewusst `worship-data`,
  # damit bestehende Instanzen ihre Daten ohne Umkopieren behalten.
  worship-data:
